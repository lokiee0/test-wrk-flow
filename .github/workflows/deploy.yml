name: Deploy Portfolio to GitHub Pages

# Triggers: runs on every push to main branch
on:
  push:
    branches:
      - main
  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

# Required permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Build
  # ─────────────────────────────────────────
  build:
    name: Build Portfolio
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 Validate HTML
        run: |
          echo "Checking index.html exists..."
          test -f index.html && echo "✅ index.html found" || (echo "❌ index.html missing" && exit 1)

      # Optional: if you add a build step (e.g., Vite, Webpack, etc.), add it here.
      # For a plain HTML site, we just copy files to the output folder.

      - name: 📁 Prepare build output
        run: |
          mkdir -p _site
          cp index.html _site/
          # Copy any other assets: images, CSS files, JS files
          # cp -r assets/ _site/assets/ 2>/dev/null || true
          # cp -r css/    _site/css/    2>/dev/null || true
          # cp -r js/     _site/js/     2>/dev/null || true

      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v4

      - name: 📦 Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # ─────────────────────────────────────────
  # JOB 2 — Deploy
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build           # Only runs if 'build' job passes
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ Print live URL
        run: |
          echo "Portfolio is live at: ${{ steps.deployment.outputs.page_url }}"
